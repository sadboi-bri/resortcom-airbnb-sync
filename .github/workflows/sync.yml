name: ResortCom → Airbnb Calendar Sync

on:
  schedule:
    - cron: "0 8 * * *"   # Runs every day at 8:00 AM UTC
  workflow_dispatch:        # Allows you to run it manually anytime

jobs:
  sync-calendar:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run sync script
        env:
          RESORTCOM_USERNAME: ${{ secrets.RESORTCOM_USERNAME }}
          RESORTCOM_PASSWORD: ${{ secrets.RESORTCOM_PASSWORD }}
        run: python scraper.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
            page_debug.html
            available_dates.json
          retention-days: 3

      - name: Commit and push updated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar.ics available_dates.json
          git diff --staged --quiet || git commit -m "chore: update calendar $(date -u '+%Y-%m-%d')"
          git push
